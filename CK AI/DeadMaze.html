<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceMaze (3 Maps Edition)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  :root {
    --bg:#f0e6d0; --accent:#c0392b; --gold:#d4870a; --green:#27ae60;
    --blue:#2980b9; --text:#3d2b1f; --dim:#a08060;
    --hud-bg:rgba(60,35,15,0.85); --hud-bdr:#8b6040;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Press Start 2P',monospace;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; overflow:hidden; image-rendering:pixelated;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(183, 150, 117, 0.15) 39px,rgba(160,120,80,0.15) 40px),
      repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(160,120,80,0.15) 39px,rgba(160,120,80,0.15) 40px);
  }
  h1{font-size:20px;color:var(--accent);text-shadow:2px 2px 0 #7a1a0a,0 0 20px rgba(192,57,43,0.4);letter-spacing:4px;margin-bottom:4px;}

  /* TOP INFO BAR */
  #top-bar{
    display:flex; align-items:center; justify-content:space-between;
    width:100%; max-width:800px; margin-bottom:6px; gap:8px;
  }
  .tbox{background:var(--hud-bg);border:2px solid var(--hud-bdr);padding:5px 10px;font-size:6px;color:#e8d5b0;line-height:2;}
  #lives-box{display:flex;gap:4px;align-items:center;padding:6px 10px;}
  .heart{font-size:13px;transition:all 0.2s;}
  .heart.lost{opacity:0.2;filter:grayscale(1);}
  #timer-box{flex:1;text-align:center;}
  #timer-val{font-size:13px;color:#f5c842;text-shadow:1px 1px 0 #8b6010;}
  #timer-val.warn{color:#e74c3c;animation:tblink 0.5s infinite;}
  @keyframes tblink{0%,100%{opacity:1}50%{opacity:0.3}}
  #score-box{text-align:right;}
  #score-val{font-size:11px;color:#f5c842;}

  /* GAME WRAP */
  #game-wrap{
    position:relative;
    border:6px solid #8b5e2a;
    box-shadow:0 0 0 2px #c8a060,0 0 0 4px #8b5e2a,4px 4px 0 #5a3a10,8px 8px 20px rgba(0,0,0,0.4);
    image-rendering:pixelated;
  }
  canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

  /* BOTTOM HUD */
  #hud{display:flex;align-items:stretch;width:100%;max-width:800px;margin-top:8px;gap:8px;}
  .hud-box{background:var(--hud-bg);border:2px solid var(--hud-bdr);padding:7px 10px;font-size:6px;color:#e8d5b0;line-height:2.2;}
  #status-box{min-width:160px;}
  #status-box.listening{border-color:var(--accent);box-shadow:0 0 8px var(--accent);}
  #status-box.success{border-color:var(--green);box-shadow:0 0 8px var(--green);}
  #status-box.autorun{border-color:#f39c12;box-shadow:0 0 8px #f39c12;}
  #mic-icon{font-size:14px;}
  #hold-bar-wrap{height:5px;background:rgba(255,255,255,0.1);border:1px solid var(--hud-bdr);margin-top:5px;overflow:hidden;}
  #hold-bar{height:100%;width:0%;background:#e8d5b0;transition:background 0.1s;}
  #hold-bar.ready{background:#f39c12;box-shadow:0 0 4px #f39c12;}
  #prediction-box{flex:1;text-align:center;color:#c8b090;line-height:2;}
  #prediction-box .word{font-size:13px;color:#f5c842;text-shadow:1px 1px 0 #8b6010,0 0 8px rgba(245,200,66,0.5);display:block;min-height:18px;}
  #mode-badge{font-size:5px;padding:2px 5px;margin-top:2px;background:rgba(243,156,18,0.2);border:1px solid #f39c12;color:#f39c12;display:none;}
  #mode-badge.show{display:inline-block;}
  #help-box{font-size:5px;color:#a09070;line-height:2.2;min-width:160px;}
  #help-box span{color:#f5c842;}

  /* OVERLAYS */
  .overlay{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:50;}
  .overlay.show{display:flex;}
  #end-screen, #map-screen{background:rgba(40,20,5,0.95);}
  #hit-flash{background:rgba(192,57,43,0);pointer-events:none;}
  #hit-flash.show{animation:hitfx 0.7s forwards;}
  @keyframes hitfx{0%{background:rgba(192,57,43,0.55)}100%{background:rgba(192,57,43,0)}}

  h2{font-size:16px;animation:pulse 1s infinite;}
  h2.win{color:#f5c842;text-shadow:2px 2px 0 #8b6010,0 0 20px rgba(245,200,66,0.6);}
  h2.lose{color:#e74c3c;text-shadow:2px 2px 0 #7a0a0a;}
  h2.title{color:#e8d5b0;text-shadow:2px 2px 0 #5a3a10; animation:none;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  p{font-size:6px;color:#e8d5b0;line-height:2.5;text-align:center;}
  .end-score{font-size:13px;color:#f5c842;text-shadow:1px 1px 0 #8b6010;}

  /* Leaderboard */
  #lb-wrap{background:rgba(0,0,0,0.3);border:2px solid var(--hud-bdr);padding:10px 16px;min-width:320px;}
  #lb-title{font-size:7px;color:#f5c842;text-align:center;margin-bottom:8px;letter-spacing:2px;}
  .lb-row{display:flex;gap:8px;font-size:5px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.08);color:#e8d5b0;}
  .lb-row.me{color:#f5c842;}
  .lb-rank{min-width:20px;color:var(--dim);}
  .lb-rank.gold{color:#f5c842;} .lb-rank.silver{color:#bbb;} .lb-rank.bronze{color:#cd7f32;}
  .lb-name{flex:1;}
  .lb-score{color:#f5c842;min-width:50px;text-align:right;}
  .lb-detail{color:var(--dim);font-size:4px;margin-left:4px;}

  /* Name input */
  #name-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
  #name-wrap label{font-size:6px;color:#e8d5b0;}
  #name-input{
    background:#050510;border:2px solid var(--hud-bdr);color:#f5c842;
    font-family:'Press Start 2P',monospace;font-size:8px;
    padding:6px 10px;width:200px;text-align:center;text-transform:uppercase;
  }
  #name-input:focus{outline:none;border-color:#f39c12;}

  .ovr-btn{
    background:var(--accent);color:#fff;border:none;
    font-family:'Press Start 2P',monospace;font-size:7px;
    padding:9px 18px;cursor:pointer;box-shadow:0 4px 0 #7a1a0a;transition:transform 0.1s;
  }
  .ovr-btn:active{transform:translateY(4px);box-shadow:none;}
  .ovr-btn:disabled{cursor:default;}
  .ovr-btn.sec{background:#5a3a10;box-shadow:0 4px 0 #2a1a00;}
  .ovr-btn.save-btn{background:#27ae60;box-shadow:0 4px 0 #1a6b3c;}
  .ovr-btn.save-btn:hover:not(:disabled){background:#2ecc71;}
  .ovr-btn.save-btn:disabled{background:#1a6b3c;box-shadow:none;opacity:0.85;}
  .map-btn{background:#2980b9;box-shadow:0 4px 0 #1b4f72; min-width:180px; margin:4px 0;}
  .map-btn:hover{background:#3498db;}

  #api-error{font-size:5px;color:var(--accent);text-align:center;margin-top:3px;min-height:10px;}
</style>
</head>
<body>

<h1>▓ DEADMAZE ▓</h1>

<div id="top-bar">
  <div class="tbox" id="lives-box">
    <span class="heart" id="h1">❤️</span>
    <span class="heart" id="h2">❤️</span>
    <span class="heart" id="h3">❤️</span>
  </div>
  <div class="tbox" id="timer-box">⏱ <span id="timer-val">2:30</span></div>
  <div class="tbox" id="score-box">SCORE<br><span id="score-val">0</span></div>
</div>

<div id="game-wrap">
  <canvas id="maze-canvas" width="800" height="560"></canvas>

  <div class="overlay show" id="map-screen">
    <h2 class="title">SELECT MISSION</h2>
    <button class="ovr-btn map-btn" onclick="selectMap(0)">MAP 1: THE PRISON</button>
    <button class="ovr-btn map-btn" onclick="selectMap(1)">MAP 2: DARK LAB</button>
    <button class="ovr-btn map-btn" onclick="selectMap(2)">MAP 3: HELL GATE</button>
  </div>

  <div class="overlay" id="end-screen">
    <h2 id="end-title">★ ESCAPED! ★</h2>
    <p id="end-detail">—</p>
    <div class="end-score" id="end-score-val">0 PTS</div>

    <div id="name-wrap">
      <label>NHẬP TÊN CỦA BẠN:</label>
      <input id="name-input" maxlength="8" placeholder="PLAYER" value="PLAYER">
    </div>

    <div id="lb-wrap">
      <div id="lb-title">🏆 TOP 5 LEADERBOARD</div>
      <div id="lb-body"></div>
    </div>

    <!-- ══ FIX: 3 nút tách biệt rõ ràng ══ -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
      <button class="ovr-btn save-btn" id="save-btn" onclick="saveScore()">💾 SAVE</button>
      <button class="ovr-btn" onclick="submitAndRestart()">▶ PLAY AGAIN</button>
      <button class="ovr-btn sec" onclick="skipAndRestart()">MAIN MENU</button>
    </div>
  </div>

  <div class="overlay" id="hit-flash"></div>
</div>

<div id="hud">
  <div class="hud-box" id="status-box">
    <div id="mic-icon">🎙</div>
    <div id="status-text">HOLD SPACE<br>TO SPEAK</div>
    <div id="hold-bar-wrap"><div id="hold-bar"></div></div>
  </div>
  <div class="hud-box" id="prediction-box">
    LAST COMMAND<br>
    <span class="word" id="pred-word">—</span>
    <span id="pred-conf"></span><br>
    <span id="mode-badge">AUTO-RUN</span>
  </div>
  <div class="hud-box" id="help-box">
    <span>SHORT RELEASE</span> &lt;1.2s = Move 1 tile<br>
    <span>HOLD & RELEASE</span> ≥1.2s = AUTO-RUN<br>
    <span>REALTIME GUARDS</span><br>
    <span>↑↓←→</span> ARROW KEYS<br>
    <span>R</span> = RESTART
  </div>
</div>
<div id="api-error"></div>

// ═══════════════════════════════════════════════════
// HỆ THỐNG ĐIỀU KHIỂN CHỌN MAP
// ═══════════════════════════════════════════════════
function selectMap(idx) {
  currentMapIdx = idx;
  currentMaze = MAP_DATABASE[idx].maze;
  document.getElementById('map-screen').classList.remove('show');

}

function openMainMenu() {
  clearInterval(timerInterval);
  clearInterval(guardTimer);
  document.getElementById('end-screen').classList.remove('show');
  document.getElementById('map-screen').classList.add('show');
}

// ═══════════════════════════════════════════════════
// CANVAS DRAWING
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('maze-canvas');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const C = {
  // floor & path màu giữ nguyên cho tất cả map
  floor1:'#c89060', floor2:'#b87848', floorLine:'rgba(90,50,15,0.18)',
  pathHL:'rgba(243,156,18,0.30)',
  player:'#c0392b', playerDark:'#7a1a0a', playerEye:'#fff8f0', playerPup:'#1a0800',
  guard:'#6c3483', guardDark:'#3d1a5e',
  guard2:'#1f618d', guard2Dark:'#114b70',
  guard3:'#d4870a', guard3Dark:'#8b6010'
};

// Bảng màu tường theo từng map
const WALL_THEMES = [
  { base:'#d4b87a', light:'#eedda0', dark:'#a07830', grout:'#b89040' },
  { base:'#e8e8e8', light:'#ffffff', dark:'#b0b0b0', grout:'#cccccc' },
  { base:'#c8a07a', light:'#e0c09a', dark:'#8a5a30', grout:'#b08050' },
];

function drawWall(col,row) {
  const W = WALL_THEMES[currentMapIdx];
  const x=col*TILE, y=row*TILE;
  ctx.fillStyle=W.base; ctx.fillRect(x,y,TILE,TILE);
  const bh=TILE/2, offX=(row%2===0)?0:TILE/2;
  ctx.fillStyle=W.grout;
  ctx.fillRect(x,y+bh-1,TILE,2);
  for(let bx=x-offX;bx<=x+TILE;bx+=TILE){
    ctx.fillRect(bx-1,y,2,bh);
    ctx.fillRect(bx-1+TILE/2,y+bh,2,bh);
  }
  ctx.fillStyle=W.light; ctx.fillRect(x,y,TILE,3); ctx.fillRect(x,y,3,TILE);
  ctx.fillStyle=W.dark;  ctx.fillRect(x,y+TILE-3,TILE,3); ctx.fillRect(x+TILE-3,y,3,TILE);
}

function drawFloor(col,row,hl) {
  const x=col*TILE, y=row*TILE;
  ctx.fillStyle=(col+row)%2===0?C.floor1:C.floor2; ctx.fillRect(x,y,TILE,TILE);
  ctx.strokeStyle=C.floorLine; ctx.lineWidth=1; ctx.strokeRect(x+.5,y+.5,TILE-1,TILE-1);
  if(hl){ctx.fillStyle=C.pathHL; ctx.fillRect(x,y,TILE,TILE);}
}

function drawExit(col,row) {
  drawFloor(col,row,false);
  const x=col*TILE, y=row*TILE;
  const blink=Math.sin(Date.now()/450)*0.5+0.5;
  const grd=ctx.createRadialGradient(x+TILE/2,y+TILE/2,2,x+TILE/2,y+TILE/2,TILE*1.3);
  grd.addColorStop(0,`rgba(39,174,96,${0.3+blink*0.25})`);
  grd.addColorStop(1,'rgba(39,174,96,0)');
  ctx.fillStyle=grd; ctx.fillRect(x-TILE,y-TILE,TILE*3,TILE*3);
  ctx.fillStyle=`rgba(39,174,96,${0.12+blink*0.12})`; ctx.fillRect(x,y,TILE,TILE);
  ctx.fillStyle=`rgba(39,174,96,${0.7+blink*0.3})`;
  ctx.font=`${TILE*.5}px monospace`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('▶',x+TILE/2,y+TILE/2);
}

function drawPlayer(col,row) {
  if(invincible&&Math.floor(Date.now()/120)%2===0) return;
  const px=col*TILE+4, py=row*TILE+4, s=TILE-8;
  ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(px+4,py+s-2,s-4,5);
  ctx.fillStyle=C.player;      ctx.fillRect(px+s*.2,py,s*.6,s*.4);
  ctx.fillStyle=C.playerDark;  ctx.fillRect(px+s*.15,py+s*.4,s*.7,s*.4);
  ctx.fillStyle=C.player;
  ctx.fillRect(px+s*.15,py+s*.8,s*.28,s*.2);
  ctx.fillRect(px+s*.57,py+s*.8,s*.28,s*.2);
  ctx.fillStyle=C.playerEye;
  ctx.fillRect(px+s*.28,py+s*.1,s*.18,s*.18);
  ctx.fillRect(px+s*.54,py+s*.1,s*.18,s*.18);
  ctx.fillStyle=C.playerPup;
  ctx.fillRect(px+s*.32,py+s*.13,s*.1,s*.1);
  ctx.fillRect(px+s*.58,py+s*.13,s*.1,s*.1);
  ctx.strokeStyle=C.playerDark; ctx.lineWidth=2;
  ctx.strokeRect(px+s*.2,py,s*.6,s*.4);
}

function drawGuard(g, type) {
  if(!g.patrol || !g.patrol.length) return;
  const px=g.col*TILE+4, py=g.row*TILE+4, s=TILE-8;
  
  let bodyColor = C.guard;
  let darkColor = C.guardDark;
  let glowColor = 'rgba(108,52,131,0.22)';

  if (type === 2) {
    bodyColor = C.guard2; darkColor = C.guard2Dark; glowColor = 'rgba(31,97,141,0.22)';
  } else if (type === 3) {
    bodyColor = C.guard3; darkColor = C.guard3Dark; glowColor = 'rgba(212,135,10,0.22)';
  }

  const grd=ctx.createRadialGradient(g.col*TILE+TILE/2,g.row*TILE+TILE/2,4,g.col*TILE+TILE/2,g.row*TILE+TILE/2,TILE*1.2);
  grd.addColorStop(0,glowColor); grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd; ctx.fillRect((g.col-1)*TILE,(g.row-1)*TILE,TILE*3,TILE*3);

  ctx.fillStyle=bodyColor;      ctx.fillRect(px+s*.15,py,s*.7,s*.45);
  ctx.fillStyle=darkColor;  ctx.fillRect(px+s*.1,py+s*.45,s*.8,s*.35);
  ctx.fillStyle=bodyColor;
  ctx.fillRect(px+s*.1,py+s*.8,s*.3,s*.2);
  ctx.fillRect(px+s*.6,py+s*.8,s*.3,s*.2);
  
  ctx.fillStyle='#ff4444';
  ctx.fillRect(px+s*.25,py+s*.1,s*.18,s*.18);
  ctx.fillRect(px+s*.57,py+s*.1,s*.18,s*.18);
  ctx.fillStyle='#fff';
  ctx.fillRect(px+s*.3,py+s*.13,s*.08,s*.08);
  ctx.fillRect(px+s*.62,py+s*.13,s*.08,s*.08);
  ctx.strokeStyle=darkColor; ctx.lineWidth=2;
  ctx.strokeRect(px+s*.15,py,s*.7,s*.45);
}

function draw() {
  ctx.fillStyle='#e8d4b0'; ctx.fillRect(0,0,W,H);
  
  if(document.getElementById('map-screen').classList.contains('show')) {
    requestAnimationFrame(draw);
    return;
  }

  for(let r=0;r<ROWS;r++) {
    for(let c=0;c<COLS;c++) {
      const hl=highlightPath.some(h=>h.col===c&&h.row===r);
      if(r===EXIT_ROW&&c===EXIT_COL) drawExit(c,r);
      else if(currentMaze[r][c]===1) drawWall(c,r);
      else drawFloor(c,r,hl);
    }
  }
  
  ctx.fillStyle='rgba(41,128,185,0.18)';
  ctx.fillRect(START_COL*TILE,START_ROW*TILE,TILE,TILE);

  drawGuard(guard, 1);
  drawGuard(guard2, 2);
  drawGuard(guard3, 3);
  drawPlayer(player.col,player.row);

  ctx.fillStyle='rgba(60,35,15,0.75)'; ctx.fillRect(4,4,180,22);
  ctx.fillStyle='#f5c842'; ctx.font='7px "Press Start 2P",monospace';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(`M${currentMapIdx+1} | STEPS: ${steps}`,8,15);

  if(!won&&!gameOver) requestAnimationFrame(draw);
}

// ═══════════════════════════════════════════════════
// TIMERS & LOGIC
// ═══════════════════════════════════════════════════
function startTimer() {
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(won||gameOver){clearInterval(timerInterval);return;}
    timeLeft--;
    updateTimerUI();
    updateScore();
    if(timeLeft<=0){clearInterval(timerInterval);endGame(false,'timeout');}
  },1000);
}
function updateTimerUI() {
  const m=Math.floor(timeLeft/60), s=timeLeft%60;
  const el=document.getElementById('timer-val');
  el.textContent=`${m}:${String(s).padStart(2,'0')}`;
  el.className=timeLeft<=30?'warn':'';
}

function calcScore(isWin) {
  if(isWin) return timeLeft*10 + lives*200 + Math.max(0,600-steps*3);
  return Math.max(0, timeLeft*3 + lives*50 - steps*2);
}
function updateScore() {
  score=calcScore(false);
  document.getElementById('score-val').textContent=score;
}

function updateLivesUI() {
  for(let i=1;i<=3;i++)
    document.getElementById('h'+i).className='heart'+(i>lives?' lost':'');
}

function startGuard() {
  if(guardTimer) clearInterval(guardTimer);
  guardTimer=setInterval(()=>{
    if(won||gameOver) return;
    
    if(guard.patrol.length) {
      guard.idx = (guard.idx + 1) % guard.patrol.length;
      guard.col = guard.patrol[guard.idx].c;
      guard.row = guard.patrol[guard.idx].r;
    }
    
    if(guard2.patrol.length) {
      guard2.idx = (guard2.idx + 1) % guard2.patrol.length;
      guard2.col = guard2.patrol[guard2.idx].c;
      guard2.row = guard2.patrol[guard2.idx].r;
    }

    if(guard3.patrol.length) {
      guard3.idx = (guard3.idx + 1) % guard3.patrol.length;
      guard3.col = guard3.patrol[guard3.idx].c;
      guard3.row = guard3.patrol[guard3.idx].r;
    }
    
    checkCollision();
  }, GUARD_MS);
}

function checkCollision() {
  if(invincible) return;
  if((guard.patrol.length && guard.col===player.col && guard.row===player.row) || 
     (guard2.patrol.length && guard2.col===player.col && guard2.row===player.row) ||
     (guard3.patrol.length && guard3.col===player.col && guard3.row===player.row)) {
    hitPlayer();
  }
}

function hitPlayer() {
  if(invincible) return;
  lives--; updateLivesUI(); updateScore();
  const hf=document.getElementById('hit-flash');
  hf.classList.remove('show'); void hf.offsetWidth; hf.classList.add('show');
  if(lives<=0){endGame(false,'lives');return;}
  
  animating=false; 
  highlightPath=[];
  invincible=true; 
  
  setTimeout(()=>invincible=false,2500); 
  setStatus('','🎙','HOLD SPACE<br>TO SPEAK');
}

function endGame(isWin, reason) {
  won=isWin; gameOver=!isWin;
  clearInterval(timerInterval); clearInterval(guardTimer);
  pendingScore = calcScore(isWin);
  document.getElementById('score-val').textContent=pendingScore;

  const titleEl=document.getElementById('end-title');
  const detailEl=document.getElementById('end-detail');
  const scoreEl=document.getElementById('end-score-val');

  if(isWin){
    titleEl.className='win'; titleEl.textContent='★ ESCAPED! ★';
    detailEl.textContent=`MAP ${currentMapIdx+1} · TIME: ${timeLeft}s · STEPS: ${steps}`;
  } else {
    titleEl.className='lose';
    titleEl.textContent=reason==='timeout'?'⏰ TIME\'S UP!':'✖ GAME OVER ✖';
    detailEl.textContent=reason==='timeout'?'Hết thời gian!':'Hết mạng!';
  }
  scoreEl.textContent=`${pendingScore} PTS`;

  // Reset nút Save về trạng thái ban đầu
  const saveBtn=document.getElementById('save-btn');
  saveBtn.textContent='💾 SAVE';
  saveBtn.disabled=false;
  saveBtn.style.background='';
  saveBtn.style.boxShadow='';

  const lb=loadLeaderboard();
  const wouldEnter=isWin||lb.length<5||pendingScore>lb[lb.length-1]?.score;
  document.getElementById('name-wrap').style.display=wouldEnter?'flex':'none';

  renderLeaderboard(lb, null);
  document.getElementById('end-screen').classList.add('show');
}

// LEADERBOARD
// ═══════════════════════════════════════════════════
function getLeaderboardKey() {
  return `deadmaze_lb_map${currentMapIdx + 1}`;
}
function loadLeaderboard() {
  try { return JSON.parse(localStorage.getItem(getLeaderboardKey())||'[]'); }
  catch(e){ return []; }
}
function saveLeaderboard(lb) {
  localStorage.setItem(getLeaderboardKey(), JSON.stringify(lb));
}
function addToLeaderboard(name, score, steps, timeLeft, lives) {
  const lb=loadLeaderboard();
  const entry={name:name.toUpperCase().trim()||'PLAYER', score, steps, timeLeft, lives, date:new Date().toLocaleDateString('vi')};
  lb.push(entry);
  lb.sort((a,b)=>b.score-a.score);
  const top5=lb.slice(0,5);
  saveLeaderboard(top5);
  return top5;
}
function renderLeaderboard(lb, highlightIdx) {
  const body=document.getElementById('lb-body');
  document.getElementById('lb-title').textContent = `🏆 TOP 5 MAP ${currentMapIdx+1} LEADERBOARD`;
  if(!lb.length){body.innerHTML='<div style="font-size:5px;color:var(--dim);text-align:center;padding:8px">CHƯA CÓ KẾT QUẢ</div>';return;}
  const ranks=['🥇','🥈','🥉','4','5'];
  const rankClass=['gold','silver','bronze','',''];
  body.innerHTML=lb.slice(0,5).map((e,i)=>`
    <div class="lb-row${i===highlightIdx?' me':''}">
      <div class="lb-rank ${rankClass[i]}">${ranks[i]}</div>
      <div class="lb-name">${e.name}</div>
      <div class="lb-score">${e.score}</div>
      <div class="lb-detail">${e.steps}b·${e.timeLeft}s·${e.lives}❤️</div>
    </div>`).join('');
}

function saveScore() {
  const btn = document.getElementById('save-btn');
  if(btn.disabled) return; // Chống bấm 2 lần

  const name = document.getElementById('name-input').value || 'PLAYER';
  const newLb = addToLeaderboard(name, pendingScore, steps, timeLeft, lives);

/** Lưu (nếu chưa lưu) rồi restart cùng map. */
function submitAndRestart() {
  const btn = document.getElementById('save-btn');
  if(!btn.disabled) {
    // Người dùng chưa bấm Save trước, tự động lưu
    const name = document.getElementById('name-input').value || 'PLAYER';

// ═══════════════════════════════════════════════════
// MOVEMENT LOGIC
// ═══════════════════════════════════════════════════
const DIRS={up:{dc:0,dr:-1},down:{dc:0,dr:1},left:{dc:-1,dr:0},right:{dc:1,dr:0}};
const OPP={up:'down',down:'up',left:'right',right:'left'};

function isWalkable(c,r) {
  if(c<0||c>=COLS||r<0||r>=ROWS) return false;
  if(c===EXIT_COL&&r===EXIT_ROW) return true;
  return currentMaze[r][c]===0;
}
function countTurns(c,r,fromDir) {
  let n=0;
  for(const[name,{dc,dr}]of Object.entries(DIRS)){
    if(name===fromDir) continue;
    if(isWalkable(c+dc,r+dr)) n++;
  }
  return n;
}
function calcAutoRunPath(sc,sr,dir) {
  const{dc,dr}=DIRS[dir],opp=OPP[dir];
  const path=[];let c=sc,r=sr;
  while(true){
    const nc=c+dc,nr=r+dr;
    if(!isWalkable(nc,nr)) break;
    c=nc;r=nr;path.push({col:c,row:r});
    if(c===EXIT_COL&&r===EXIT_ROW) break;
    if(countTurns(c,r,opp)>1) break;
  }
  return path;
}
function tryMove(dir) {
  if(won||gameOver||animating||document.getElementById('map-screen').classList.contains('show')) return false;
  const{dc,dr}=DIRS[dir],nc=player.col+dc,nr=player.row+dr;
  if(!isWalkable(nc,nr)){flashError();return false;}
  player={col:nc,row:nr};steps++;updateScore();
  checkCollision();
  if(nc===EXIT_COL&&nr===EXIT_ROW) endGame(true);
  return true;
}
function autoRun(path) {
  if(!path.length) return;
  animating=true;highlightPath=path.slice();
  let i=0;
  function step(){
    if(won||gameOver){animating=false;highlightPath=[];return;}
    if(i>=path.length){animating=false;highlightPath=[];return;}
    const{col,row}=path[i++];
    player={col,row};steps++;highlightPath=path.slice(i);
    updateScore();checkCollision();
    if(won||gameOver){animating=false;highlightPath=[];return;}
    if(col===EXIT_COL&&row===EXIT_ROW){endGame(true);return;}
    setTimeout(step,ANIM_STEP_MS);
  }
  step();
}
function flashError(){
  canvas.style.outline='4px solid #c0392b';
  setTimeout(()=>canvas.style.outline='',300);
}

function doRestart() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  if (guardTimer) { clearInterval(guardTimer); guardTimer = null; }

  document.getElementById('end-screen').classList.remove('show');
  document.getElementById('hit-flash').classList.remove('show');

  player={col:START_COL,row:START_ROW};
  lives=3;steps=0;score=0;timeLeft=TOTAL_TIME;
  won=false;gameOver=false;animating=false;invincible=false;highlightPath=[];
  
  const mapData = MAP_DATABASE[currentMapIdx];
  guard  = {patrol:mapData.g1, idx:0, col:mapData.g1[0].c, row:mapData.g1[0].r};
  guard2 = {patrol:mapData.g2, idx:0, col:mapData.g2[0].c, row:mapData.g2[0].r};
  guard3 = {patrol:mapData.g3, idx:0, col:mapData.g3[0].c, row:mapData.g3[0].r};
  
  document.getElementById('pred-word').textContent='—';
  document.getElementById('pred-conf').textContent='';
  document.getElementById('mode-badge').classList.remove('show');
  document.getElementById('name-input').value='PLAYER';
  updateLivesUI();updateTimerUI();
  document.getElementById('score-val').textContent='0';
  
  startTimer();
  startGuard();
  
  requestAnimationFrame(draw);
}
function restartGame(){
  if(!document.getElementById('map-screen').classList.contains('show')) {
    doRestart();
  }
}

// ═══════════════════════════════════════════════════
// AUDIO PROCESSING
// ═══════════════════════════════════════════════════
let mediaStream=null,audioContext=null,scriptProcessor=null;
let recordedSamples=[],isRecording=false;
let holdStartTime=0,holdTimerRAF=null;

async function initAudio(){
  if(mediaStream)return true;
  try{mediaStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});return true;}
  catch(e){setApiError('⚠ Microphone permission denied!');return false;}
}
async function startRecording(){
  if(isRecording||animating||won||gameOver||document.getElementById('map-screen').classList.contains('show'))return;
  if(!(await initAudio()))return;
  
  isRecording=true;recordedSamples=[];holdStartTime=Date.now();
  audioContext=new AudioContext({sampleRate:SAMPLE_RATE});
  const source=audioContext.createMediaStreamSource(mediaStream);
  scriptProcessor=audioContext.createScriptProcessor(4096,1,1);
  scriptProcessor.onaudioprocess=e=>recordedSamples.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  source.connect(scriptProcessor);scriptProcessor.connect(audioContext.destination);
  setStatus('listening','🔴','RECORDING...<br>RELEASE SPACE');
  animateHoldBar();
}
function animateHoldBar(){
  const bar=document.getElementById('hold-bar');
  function tick(){
    if(!isRecording)return;
    const pct=Math.min(100,(Date.now()-holdStartTime)/LONG_HOLD_MS*100);
    bar.style.width=pct+'%';bar.className=pct>=100?'ready':'';
    if(pct>=100)setStatus('autorun','🔴','AUTO-RUN READY<br>RELEASE TO RUN');
    else holdTimerRAF=requestAnimationFrame(tick);
  }
  holdTimerRAF=requestAnimationFrame(tick);
}
async function stopRecordingAndPredict(){
  if(!isRecording)return;
  isRecording=false;cancelAnimationFrame(holdTimerRAF);
  const holdMs=Date.now()-holdStartTime,isLong=holdMs>=LONG_HOLD_MS;
  const bar=document.getElementById('hold-bar');
  bar.style.width='0%';bar.className='';
  scriptProcessor.disconnect();await audioContext.close();
  setStatus('','🎙','PROCESSING...<br>PLEASE WAIT');
  const totalLen=recordedSamples.reduce((s,a)=>s+a.length,0);
  const merged=new Float32Array(totalLen);
  let off=0;for(const c of recordedSamples){merged.set(c,off);off+=c.length;}
  
  startGuard(); 
  
  if(isLong)await handleLongHold(merged);
  else await handleShortHold(merged);
}
async function handleShortHold(merged){
  const r=await callAPI(merged);if(!r)return;
  document.getElementById('pred-word').textContent=r.label.toUpperCase();
  document.getElementById('pred-conf').textContent=`${r.confidence}%`;
  document.getElementById('mode-badge').classList.remove('show');
  setStatus('success','✅',`GOT: ${r.label.toUpperCase()}<br>${r.confidence}% (1 ô)`);
  setApiError('');tryMove(r.label.toLowerCase());
  setTimeout(()=>setStatus('','🎙','HOLD SPACE<br>TO SPEAK'),1200);
}

async function handleLongHold(merged){
  const r=await callAPI(merged);
  if(!r) return;
  
  const label=r.label.toLowerCase();
  document.getElementById('pred-word').textContent=r.label.toUpperCase();
  document.getElementById('pred-conf').textContent=`${r.confidence}%`;
  setApiError('');
  
  document.getElementById('mode-badge').classList.add('show');
  setStatus('autorun','🏃',`AUTO: ${r.label.toUpperCase()}<br>${r.confidence}%`);
  
  const path=calcAutoRunPath(player.col,player.row,label);
  if(!path.length){
    flashError();
    document.getElementById('mode-badge').classList.remove('show');
    setStatus('','🎙','HOLD SPACE<br>TO SPEAK');
  } else {
    autoRun(path);
    setTimeout(()=>{
      setStatus('','🎙','HOLD SPACE<br>TO SPEAK');
      document.getElementById('mode-badge').classList.remove('show');
    }, path.length*ANIM_STEP_MS+500);
  }
}

async function callAPI(audioData){
  const TARGET=SAMPLE_RATE;
  let final=audioData.length<TARGET?(()=>{const p=new Float32Array(TARGET);p.set(audioData);return p;})():audioData.slice(0,TARGET);
  const blob=new Blob([encodeWAV(final,SAMPLE_RATE)],{type:'audio/wav'});
  const form=new FormData();form.append('audio',blob,'voice.wav');
  try{
    const resp=await fetch(API_URL,{method:'POST',body:form});
    if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
    return await resp.json();
  }catch(e){setApiError(`⚠ API error: ${e.message}`);setStatus('','🎙','HOLD SPACE<br>TO SPEAK');return null;}
}
function encodeWAV(samples,sr){
  const dataLen=samples.length*2,buf=new ArrayBuffer(44+dataLen),v=new DataView(buf);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  ws(0,'RIFF');v.setUint32(4,36+dataLen,true);ws(8,'WAVE');ws(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);
  ws(36,'data');v.setUint32(40,dataLen,true);
  let off=44;
  for(let i=0;i<samples.length;i++,off+=2){const s=Math.max(-1,Math.min(1,samples[i]));v.setInt16(off,s<0?s*0x8000:s*0x7FFF,true);}
  return buf;
}

let spaceDown=false;
window.addEventListener('keydown',e=> {
  if(e.code==='Space'&&!spaceDown){e.preventDefault();spaceDown=true;startRecording();}
  if(e.code==='KeyR')restartGame();
  if(e.code==='ArrowUp'){e.preventDefault();tryMove('up');}
  if(e.code==='ArrowDown'){e.preventDefault();tryMove('down');}
  if(e.code==='ArrowLeft'){e.preventDefault();tryMove('left');}
  if(e.code==='ArrowRight'){e.preventDefault();tryMove('right');}
});
window.addEventListener('keyup',e=> {
  if(e.code==='Space'){e.preventDefault();spaceDown=false;stopRecordingAndPredict();}
});

function setStatus(cls,icon,html){
  document.getElementById('status-box').className='hud-box '+(cls||'');
  document.getElementById('mic-icon').textContent=icon;
  document.getElementById('status-text').innerHTML=html;
}
function setApiError(msg){document.getElementById('api-error').textContent=msg;}

requestAnimationFrame(draw);
